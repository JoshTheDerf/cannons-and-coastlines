<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://cannonsandcoastlines.com/">
    <link rel="canonical" href="https://cannonsandcoastlines.com/">
    <meta name="robots" content="noindex">
    <title>Cannons &amp; Coastlines has moved</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1a3a52;
            color: #f5f0e8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            text-align: center;
        }
        a { color: #d4a94a; }
        h1 { font-weight: 600; margin: 0 0 0.5rem; }
        p { margin: 0.5rem 0; opacity: 0.85; }
    </style>
</head>
<body>
    <div>
        <h1>Cannons &amp; Coastlines has moved</h1>
        <p>Redirecting to <a id="dest" href="https://cannonsandcoastlines.com/">cannonsandcoastlines.com</a>…</p>
        <p><small>If you are not redirected automatically, click the link above.</small></p>
    </div>
    <script>
        (function () {
            var base = "https://cannonsandcoastlines.com";
            var path = location.pathname.replace(/^\/cannons-and-coastlines/, "");
            if (!path.startsWith("/")) path = "/" + path;
            var target = base + path + location.search + location.hash;
            var dest = document.getElementById("dest");
            if (dest) dest.href = target;
            location.replace(target);
        })();
    </script>
</body>
</html>
